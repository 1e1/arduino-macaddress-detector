sentence=Passive 802.11 presence detection for the ESP8266 and ESP32.
paragraph=Puts the radio in promiscuous mode and reports the layer-2 addresses of every sniffed frame, so you can tell whether known devices are within range. The receive path is kept minimal: only the addresses needed for presence are extracted. One API, backed by the NONOS SDK on ESP8266 and ESP-IDF on ESP32.
